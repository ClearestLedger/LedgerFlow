<div><label>Name</label><input name='name' required value='{{ worker.name if worker else "" }}'></div>
<div><label>Classification</label><select name='worker_type'><option value='1099' {% if not worker or worker.worker_type == '1099' %}selected{% endif %}>1099</option><option value='W-2' {% if worker and worker.worker_type == 'W-2' %}selected{% endif %}>W-2</option></select></div>
<div><label>Operational Role</label><input name='worker_role' value='{{ worker.worker_role if worker else "" }}' placeholder='Crew Lead, Painter, Dispatcher'></div>
<div><label>Phone</label><input name='phone' value='{{ worker.phone if worker else "" }}'></div>
<div><label>Email</label><input name='email' value='{{ worker.email if worker else "" }}'></div>
<div><label>Language</label><select name='preferred_language'>{% for option in language_options %}<option value='{{ option.code }}' {% if worker and worker.preferred_language == option.code %}selected{% elif not worker and option.code == 'en' %}selected{% endif %}>{{ option.label }}</option>{% endfor %}</select></div>
<div><label>Status</label><select name='status'><option value='active' {% if not worker or worker.status == 'active' %}selected{% endif %}>Active</option><option value='inactive' {% if worker and worker.status == 'inactive' %}selected{% endif %}>Inactive</option><option value='terminated' {% if worker and worker.status == 'terminated' %}selected{% endif %}>Terminated</option></select></div>
<div><label>Payroll Frequency</label><select name='payroll_frequency'><option value='weekly' {% if not worker or worker.payroll_frequency == 'weekly' %}selected{% endif %}>Weekly</option><option value='biweekly' {% if worker and worker.payroll_frequency == 'biweekly' %}selected{% endif %}>Biweekly</option><option value='semimonthly' {% if worker and worker.payroll_frequency == 'semimonthly' %}selected{% endif %}>Semimonthly</option><option value='monthly' {% if worker and worker.payroll_frequency == 'monthly' %}selected{% endif %}>Monthly</option></select></div>
<div><label>Hire Date</label><input name='hire_date' type='date' value='{{ worker.hire_date if worker else today_iso }}'></div>
<div><label>SSN / Tax ID</label><input name='ssn' value='{{ worker.ssn if worker else "" }}'></div>
<div><label>Crew / Group</label><input name='crew_label' value='{{ worker.crew_label if worker else "" }}' placeholder='Crew A, East Route'></div>
<div><label>Skill Tags</label><input name='skill_tags' value='{{ worker.skill_tags if worker else "" }}' placeholder='deep clean, ladder work, trim'></div>
<div><label>Team Member Payment Preference</label><select name='payout_preference' class='worker-payout-select'>{% for value, label in worker_payout_preferences %}<option value='{{ value }}' {% if worker and (worker.payout_preference or 'paper_check') == value %}selected{% elif not worker and value == 'paper_check' %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
<div class='worker-payout-field payout-zelle'><label>Zelle Email / Phone</label><input name='zelle_contact' value='{{ worker.zelle_contact if worker else "" }}' placeholder='teammember@email.com or phone'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Bank Name</label><input name='deposit_bank_name' value='{{ worker.deposit_bank_name if worker else "" }}' placeholder='Chase Business Checking'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Account Holder Name</label><input name='deposit_account_holder_name' value='{{ worker.deposit_account_holder_name if worker else "" }}' placeholder='Team member legal name'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Account Type</label><select name='deposit_account_type'><option value='checking' {% if not worker or (worker.deposit_account_type or 'checking') == 'checking' %}selected{% endif %}>Checking</option><option value='savings' {% if worker and worker.deposit_account_type == 'savings' %}selected{% endif %}>Savings</option></select></div>
<div class='worker-payout-field payout-direct_deposit'><label>Routing Number</label><input name='deposit_routing_number' inputmode='numeric' maxlength='9' placeholder='{% if worker and worker.deposit_account_last4 %}Leave blank to keep current{% else %}9 digits{% endif %}'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Account Number</label><input name='deposit_account_number' inputmode='numeric' placeholder='{% if worker and worker.deposit_account_last4 %}Leave blank to keep current{% else %}Enter account number{% endif %}'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Confirm Account Number</label><input name='confirm_deposit_account_number' inputmode='numeric' placeholder='{% if worker and worker.deposit_account_last4 %}Re-enter only if changing{% else %}Re-enter account number{% endif %}'></div>
<div class='worker-payout-field payout-direct_deposit'><label>Last 4 Digits</label><input name='deposit_account_last4' value='{{ worker.deposit_account_last4 if worker else "" }}' inputmode='numeric' maxlength='4' placeholder='6789'></div>
<div style='grid-column:1/-1'><label>Address</label><input name='address' value='{{ worker.address if worker else "" }}'></div>
<div style='grid-column:1/-1'><label>Pay Notes</label><textarea name='pay_notes'>{{ worker.pay_notes if worker else "" }}</textarea></div>
<div style='grid-column:1/-1'><label>Availability Baseline</label><textarea name='availability_baseline'>{{ worker.availability_baseline if worker else "" }}</textarea></div>
<div><button type='submit'>{{ submit_label }}</button></div>
