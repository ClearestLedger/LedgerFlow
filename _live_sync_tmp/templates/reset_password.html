<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1'>
  <title>{{ app_name }} · Reset Password</title>
  <link rel='stylesheet' href='{{ url_for("static", filename="style.css") }}'>
</head>
<body class='login-body'>
  <div class='login-brand-watermark'><img src='{{ brand_logo_url }}' alt='{{ app_name }}'></div>
  <div class='login-wrap'>
    <div class='login-card'>
      <div class='login-card-brand'><img src='{{ brand_logo_url }}' alt='{{ app_name }}'></div>
      <div class='badge'>SET NEW PASSWORD</div>
      <h1>Reset Password</h1>
      <p class='small'>Choose a new password for your LedgerFlow account.</p>
      <form method='post'>
        <label>New Password</label>
        <div class='password-field'><input type='password' name='password' required><button class='password-toggle' type='button' aria-label='Show password' title='Show password'><span class='toggle-show'>👁</span><span class='toggle-hide'>🙈</span></button></div>
        <label style='margin-top:12px'>Confirm New Password</label>
        <div class='password-field'><input type='password' name='confirm_password' required><button class='password-toggle' type='button' aria-label='Show password' title='Show password'><span class='toggle-show'>👁</span><span class='toggle-hide'>🙈</span></button></div>
        <button style='margin-top:16px;width:100%'>Save New Password</button>
      </form>
      <div style='margin-top:14px;text-align:center'>
        <a class='btn btn-secondary' href='{{ url_for("login") }}'>Back to Main Login</a>
      </div>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, msg in messages %}
            <div class='flash {{ category }}' style='margin-top:12px'>{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
    </div>
  </div>
<script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('.password-field').forEach(function (field) {
    var input = field.querySelector('input');
    var toggle = field.querySelector('.password-toggle');
    if (!input || !toggle) return;
    if (toggle.dataset && toggle.dataset.toggleBound === '1') return;
    if (toggle.dataset) toggle.dataset.toggleBound = '1';
    toggle.addEventListener('click', function () {
      var visible = input.type === 'text';
      input.type = visible ? 'password' : 'text';
      field.classList.toggle('is-visible', !visible);
      toggle.setAttribute('aria-label', visible ? 'Show password' : 'Hide password');
      toggle.setAttribute('title', visible ? 'Show password' : 'Hide password');
    });
  });
});
</script>
</body>
</html>
